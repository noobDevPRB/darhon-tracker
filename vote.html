<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surf N Stein - Votação</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #121212;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .card {
            background: #1C1C1C;
            border: 1px solid #3D3D3D;
            border-radius: 16px;
            padding: 32px 24px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 8px;
            color: #B6FD01;
        }

        p {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            background: #B6FD01;
            color: #121212;
            font-weight: 700;
            font-size: 16px;
            padding: 14px 32px;
            border-radius: 200px;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .fallback {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }

        .fallback a {
            color: #D1A066;
        }

        .spinner {
            border: 3px solid #3D3D3D;
            border-top: 3px solid #B6FD01;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="spinner" id="spinner"></div>
        <h1>Surf N Stein</h1>
        <p id="message">Abrindo o app...</p>
        <a class="btn" id="openBtn" style="display:none;">Abrir no App</a>
        <div class="fallback" id="fallback" style="display:none;">
            <p>Não tem o app? Baixe na
                <a href="https://play.google.com/store/apps/details?id=com.surfnstein" target="_blank">Google Play</a>
                ou
                <a href="https://apps.apple.com/app/surfnstein" target="_blank">App Store</a>.
            </p>
        </div>
    </div>

    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var type = params.get('type');
            var challengeId = params.get('challengeId');
            var athleteUserId = params.get('athleteUserId');

            if (!type || !challengeId) {
                document.getElementById('message').textContent = 'Link inválido.';
                document.getElementById('spinner').style.display = 'none';
                return;
            }

            var deepLink;
            if (type === 'competitor' && athleteUserId) {
                deepLink = 'surfnstein://vote/competitor?challengeId=' + encodeURIComponent(challengeId) + '&athleteUserId=' + encodeURIComponent(athleteUserId);
            } else if (type === 'public') {
                deepLink = 'surfnstein://vote/public?challengeId=' + encodeURIComponent(challengeId);
            } else {
                document.getElementById('message').textContent = 'Link inválido.';
                document.getElementById('spinner').style.display = 'none';
                return;
            }

            // Tenta abrir o app automaticamente
            window.location.href = deepLink;

            // Após 1.5s, se ainda está na página, mostra botão manual + fallback
            setTimeout(function () {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('message').textContent = 'Toque no botão para abrir no app:';
                var btn = document.getElementById('openBtn');
                btn.href = deepLink;
                btn.style.display = 'inline-block';
                btn.textContent = 'Abrir no App';
                document.getElementById('fallback').style.display = 'block';
            }, 1500);
        })();
    </script>
</body>

</html>
